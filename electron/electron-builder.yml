appId: com.wondervoice.library
productName: WONDERvoice
directories:
  output: dist
  # App icons live here (build/icon.icns for mac, build/icon.ico for win).
  buildResources: build

files:
  - main.js
  - preload.js
  - package.json

# Ad-hoc signs the macOS bundle after packing (see afterPack.js) so downloaded
# copies aren't flagged "damaged" by Gatekeeper.
afterPack: ./afterPack.js

# The standalone Next.js server (built by build.sh) ships as a resource and
# is spawned by main.js with Electron's own binary as Node.
extraResources:
  - from: ../.next-local/standalone
    to: server

mac:
  category: public.app-category.finance
  icon: build/icon.icns
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  # Unsigned build: first launch needs right-click → Open (documented in README).
  identity: null

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]

linux:
  target:
    - target: AppImage
      arch: [x64]
