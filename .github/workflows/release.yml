name: Release desktop app

# Fires when you push a version tag (e.g. `git tag v1.1.0 && git push --tags`),
# or manually from the Actions tab. Builds the macOS .dmg and Windows .exe,
# writes latest.json, and publishes them all as a Release in the PUBLIC
# releases repo — this source repo can stay private.
#
# Pipeline:
#   bundle   — build the portable Next standalone server ONCE on Linux.
#   package  — download that bundle and wrap it in a .dmg (mac) / .exe (win).
#   release  — collect the installers, write latest.json, publish the Release.
#
# The Next server is plain Node JS, so building it once and packaging it per-OS
# avoids running `next build` on the Windows runner (its file tracing chokes on
# C:\...\WindowsApps app-alias reparse points with EACCES).
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, no leading v (e.g. 1.1.0)"
        required: true
      notes:
        description: "Release notes shown in the app's update banner"
        required: false
        default: ""

permissions:
  contents: read

env:
  # The public repo that holds the downloadable installers + latest.json.
  RELEASES_REPO: Akila-Kavisinghe/MaInvoice-releases

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # Build the self-contained standalone server + fold in the static assets
      # the standalone output doesn't include (mirrors electron/build.sh's first
      # half, minus the platform-specific packaging).
      - name: Build standalone Next server
        run: |
          rm -rf .next-local
          LOCAL_MODE=1 BUILD_STANDALONE=1 pnpm build
          test -f .next-local/standalone/server.js
          cp -R .next-local/static .next-local/standalone/.next-local/static
          cp -R public .next-local/standalone/public
          rm -rf .next-local/standalone/data

      # include-hidden-files is required: the standalone bundle nests its
      # runtime under a dot-dir (.next-local/), which v4 would otherwise drop.
      - name: Upload standalone bundle
        uses: actions/upload-artifact@v4
        with:
          name: standalone
          path: .next-local/standalone
          include-hidden-files: true
          if-no-files-found: error

  package:
    needs: bundle
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: mac
          - os: windows-latest
            artifact: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 8

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Resolve the version from the tag (v1.1.0 -> 1.1.0) or the manual input.
      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Packaging version $VERSION"

      # Stamp the version into electron/package.json so the packaged app's
      # app.getVersion() matches the tag (the update banner compares them).
      - name: Set app version
        shell: bash
        run: |
          node -e "const fs=require('fs');const p='electron/package.json';const j=JSON.parse(fs.readFileSync(p));j.version=process.env.VERSION;fs.writeFileSync(p,JSON.stringify(j,null,2)+'\n');"

      # electron-builder's extraResources reads ../.next-local/standalone, so
      # restore the bundle to exactly that path.
      - name: Download standalone bundle
        uses: actions/download-artifact@v4
        with:
          name: standalone
          path: .next-local/standalone

      - name: Install electron build deps
        shell: bash
        run: pnpm --dir electron install --no-frozen-lockfile

      - name: Package installer
        shell: bash
        working-directory: electron
        env:
          # Never sign on CI: the mac build is intentionally unsigned
          # (electron-builder.yml sets identity: null); this stops it probing
          # the runner keychain. Windows is unsigned too (SmartScreen warns).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: pnpm exec electron-builder

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.artifact }}
          path: |
            electron/dist/*.dmg
            electron/dist/*.exe
          if-no-files-found: error

  release:
    needs: package
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
            NOTES="${{ github.event.inputs.notes }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            NOTES=""
          fi
          [ -n "$NOTES" ] || NOTES="Version $VERSION is available."
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "NOTES=$NOTES" >> "$GITHUB_ENV"

      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: installers-*

      # The manifest the app fetches on launch. `url` is the public releases
      # page the Download button opens; `version` drives the banner.
      - name: Write latest.json
        shell: bash
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('latest.json',JSON.stringify({version:process.env.VERSION,url:'https://github.com/'+process.env.RELEASES_REPO+'/releases/latest',notes:process.env.NOTES},null,2)+'\n');"
          cat latest.json

      - name: Publish release to public repo
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASES_TOKEN }}
        run: |
          # nullglob: patterns with no match expand to nothing (not the literal
          # pattern). Array + "${files[@]}" preserves filenames with spaces,
          # e.g. "WONDERvoice Setup 1.0.0.exe".
          shopt -s nullglob
          files=(artifacts/*/*.dmg artifacts/*/*.exe)
          printf 'Attaching: %s\n' latest.json "${files[@]}"
          gh release create "v${VERSION}" \
            --repo "$RELEASES_REPO" \
            --title "WONDERvoice v${VERSION}" \
            --notes "${NOTES}" \
            latest.json "${files[@]}"
